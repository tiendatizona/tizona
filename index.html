<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tizona</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      background:#0b0b0b;
      color:white;
    }

    header{
      height:100vh;
      background:
      linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.7)),
      url('https://images.unsplash.com/photo-1518562180175-34a163b1a9a6?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
    }

    .hero h1{
      font-size:80px;
      letter-spacing:8px;
      text-transform:uppercase;
    }

    .hero p{
      margin-top:20px;
      font-size:22px;
      color:#ddd;
    }

    .btn{
      display:inline-block;
      margin-top:35px;
      padding:15px 35px;
      background:#b8860b;
      color:white;
      text-decoration:none;
      border-radius:12px;
      font-weight:bold;
      transition:.3s;
    }

    .btn:hover{
      background:#d4a514;
    }

    section{
      padding:80px 20px;
    }

    .title{
      text-align:center;
      font-size:42px;
      margin-bottom:50px;
      text-transform:uppercase;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:30px;
      max-width:1200px;
      margin:auto;
    }

    .card{
      background:#161616;
      border-radius:20px;
      overflow:hidden;
      transition:.3s;
    }

    .card:hover{
      transform:translateY(-8px);
    }

    .card img{
      width:100%;
      height:320px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card h3{
      margin-bottom:10px;
      font-size:24px;
    }

    .price{
      color:#d4a514;
      font-size:20px;
      margin-bottom:15px;
    }

    footer{
      text-align:center;
      padding:40px;
      background:black;
      color:#888;
    }
  </style>
</head>

<body>

<header>
  <div class="hero">
    <h1>Tizona</h1>
    <p>Ropa · Banderas · Historia · Tradición</p>

    <a href="#tienda" class="btn">
      Entrar a la tienda
    </a>
  </div>
</header>

<section id="tienda">

  <h2 class="title">Colección Destacada</h2>

  <div class="products">

    <div class="card">
      <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop">

      <div class="card-content">
        <h3>Camiseta Cruz de Borgoña</h3>
        <div class="price">24,99€</div>

        <a href="#" class="btn">
          Comprar
        </a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=1200&auto=format&fit=crop">

      <div class="card-content">
        <h3>Sudadera Templaria</h3>
        <div class="price">44,99€</div>

        <a href="#" class="btn">
          Comprar
        </a>
      </div>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1520342868574-5fa3804e551c?q=80&w=1200&auto=format&fit=crop">

      <div class="card-content">
        <h3>Bandera Histórica</h3>
        <div class="price">19,99€</div>

        <a href="#" class="btn">
          Comprar
        </a>
      </div>
    </div>

  </div>

</section>

<footer>
  © 2026 Tizona — Honor y tradición
</footer>

</body>
</html>
