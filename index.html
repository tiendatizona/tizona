<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tizona</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:white;
color:black;
}

header{
padding:80px 20px;
text-align:center;
background:#f5f5f5;
}

h1{
font-size:70px;
margin:0;
}

p{
font-size:20px;
}

.btn{
display:inline-block;
margin-top:20px;
padding:15px 30px;
background:black;
color:white;
text-decoration:none;
border-radius:10px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:50px 20px;
}

.card{
border:1px solid #ddd;
border-radius:15px;
padding:20px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

footer{
background:black;
color:white;
text-align:center;
padding:40px;
}
</style>
</head>

<body>

<header>
<h1>TIZONA</h1>
<p>Ropa · Banderas · Historia</p>

<a class="btn" href="#">Ver catálogo</a>
</header>

<section class="products">

<div class="card">
<h2>Camiseta Cruz de Borgoña</h2>
<p>24,90€</p>
</div>

<div class="card">
<h2>Sudadera Tercios</h2>
<p>39,90€</p>
</div>

<div class="card">
<h2>Bandera Histórica</h2>
<p>19,90€</p>
</div>

</section>

<footer>
Tizona © 2026
</footer>

</body>
</html>
